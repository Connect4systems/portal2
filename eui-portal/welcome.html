<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>EUI | Login Successful</title>

    <style>
        body {
            display: grid;
            min-height: 100vh;
            margin: 0;
            place-items: center;
            background: #f3f5f7;
            color: #092a4a;
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Arial,
                sans-serif;
        }

        .card {
            width: min(420px, calc(100% - 40px));
            padding: 42px;
            background: #ffffff;
            border: 1px solid #dce2e8;
            border-radius: 10px;
            box-shadow: 0 18px 50px rgba(9, 42, 74, 0.1);
            text-align: center;
        }

        img {
            width: 110px;
            height: auto;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 30px;
        }

        p {
            margin: 0;
            color: #6b7688;
            line-height: 1.7;
        }
    </style>
</head>


<body>
    <main class="card">
        <img
            src="https://connect4systems.com/files/EUI-1024x1024.webp"
            alt="EUI"
        >

        <h1>Login successful</h1>

        <p>
            Your EUI account has been authenticated successfully.
        </p>
    </main>

<button id="logout">Logout</button>

<script type="module">
import { supabase } from "./supabase-config.js";

document.getElementById("logout").addEventListener("click", async () => {
    await supabase.auth.signOut();
    window.location.href = "./index.html";
});
</script>

</body>
</html>
